<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHERON - Live Weather Radar</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>WEATHERON</header>

    <div class="controls">
        <button class="active" onclick="toggleLayer(0)">🔥 Weather</button>
        <button onclick="toggleLayer(1)">🏥 Hospitals</button>
        <button id="location-btn" onclick="getCurrentLocation()">📍 My Location</button>
    </div>

    <div id="map"></div>

    <!-- WEATHER PANEL -->
    <div id="weather-box">
        <h3>🌦 Weather</h3>
        <p id="location-name"></p>
        <p id="temp">--</p>
        <p id="condition">--</p>
        <p id="feels"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
        <p id="alert-box"></p>
    </div>

    <!-- DETAILS PANEL -->
    <div id="detailspanel">
        <h3 id="d-name"></h3>
        <p id="d-address"></p>
        <p id="d-phone"></p>
        <p id="d-emergency"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script src="script.js"></script>
</body>
</html>
