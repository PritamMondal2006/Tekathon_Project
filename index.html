<style>
body { margin:0; background:#000; color:white; font-family:sans-serif; }

header {
    text-align:center;
    padding:1rem;
    font-size:2rem;
    color:#60a5fa;
    background:#0a0a0a;
}

.controls {
    display:flex;
    gap:10px;
    justify-content:center;
    padding:10px;
    background:#111;
}

button {
    padding:10px 18px;
    border:none;
    border-radius:20px;
    background:#222;
    color:white;
    cursor:pointer;

button.active { background:#3b82f6; }

#location-btn {
    background:linear-gradient(135deg,#3b82f6,#1e40af);

/* DETAILS PANEL */

#details-panel {
    position: fixed;
    right: 20px;
    top: 100px;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    width: 260px;
    display: none;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
}
</style>
</head>

// 💧 WATER ICON
const waterIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/728/728093.png',
    iconSize: [30, 30]
});

function initMap() {
    map = L.map('map').setView([userLat, userLng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    showHeatLayer();
}

// 🔥 HEATMAP
function showHeatLayer() {
    clearAll();

    const heatPoints = [
        [22.58, 88.35, 0.9],
        [22.59, 88.36, 0.8],
        [22.55, 88.38, 0.95]
    ];

    heatLayer = L.heatLayer(heatPoints, {
        radius: 50,
        blur: 30
    }).addTo(map);
}

// 📍 LOCATION
function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;

            if (userMarker) map.removeLayer(userMarker);

            userMarker = L.marker([userLat, userLng]).addTo(map)
                .bindPopup("You are here").openPopup();

            map.flyTo([userLat, userLng], 15);
            searchNearby(userLat, userLng);
        });
    }
}

// 🔁 SWITCH
function toggleLayer(layer) {
    currentLayer = layer;

    document.querySelectorAll("button").forEach((btn, i) => {
        btn.classList.toggle("active", i === layer);
    });

    searchNearby(userLat, userLng);
}

// 🔍 SEARCH
function searchNearby(lat, lng) {
    clearAll();

    if (currentLayer === 0) return showHeatLayer();
    if (currentLayer === 1) fetchWater(lat, lng);
    if (currentLayer === 2) fetchHospitals(lat, lng);
}

// 🏥 FETCH HOSPITALS
async function fetchHospitals(lat, lng) {
    const query = `
        [out:json];
        node["amenity"="hospital"](around:8000, ${lat}, ${lng});
        out body;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
    });

    const data = await res.json();

    data.elements.forEach(place => {
        const name = place.tags?.name || "Hospital";
        const address = place.tags?.["addr:full"] || "Address not available";
        const phone = place.tags?.phone || "No contact";
        const emergency = place.tags?.emergency ? "Yes" : "No";

        const marker = L.marker([place.lat, place.lon], {
            icon: hospitalIcon
        }).addTo(map);

        const container = document.createElement("div");

        const title = document.createElement("b");
        title.innerText = name;

        const btn = document.createElement("button");
        btn.innerText = "View Details";
        btn.style.marginTop = "5px";

        btn.onclick = () => {
            showDetails(name, address, phone, emergency);
        };

        container.appendChild(title);
        container.appendChild(document.createElement("br"));
        container.appendChild(btn);

        marker.bindPopup(container);

        markers.push(marker);
    });
}

// 💧 FETCH WATER
async function fetchWater(lat, lng) {
    const query = `
        [out:json];
        node["amenity"="drinking_water"](around:8000, ${lat}, ${lng});
        out;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
    });

    const data = await res.json();

    data.elements.forEach(place => {
        const marker = L.marker([place.lat, place.lon], {
            icon: waterIcon
        }).addTo(map);

        markers.push(marker);
    });
}

// 📋 DETAILS PANEL
function showDetails(name, address, phone, emergency) {
    document.getElementById("details-panel").style.display = "block";
    document.getElementById("d-name").innerText = name;
    document.getElementById("d-address").innerText = "📍 " + address;
    document.getElementById("d-phone").innerText = "📞 " + phone;
    document.getElementById("d-emergency").innerText = "🚨 Emergency: " + emergency;
}

// 🧹 CLEAR
function clearAll() {
    if (heatLayer) map.removeLayer(heatLayer);

    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

window.onload = initMap;
</script>
